# Default experiment parameters.
# These are merged with any experiment preset — the preset overrides these.
parallel_jobs: 3   # number of SLURM jobs to split tasks across (1 = sequential)

# SLURM cluster settings for worker jobs (generated by experiment.py)
cluster:
  partition: gpu
  modules:
    - anaconda3/2024.06
  conda_env: qml
  gres: "gpu:1"
  cpus_per_task: 4
  mem: "32G"
  time: "08:00:00"
