# Quantum training config (more steps, fewer samples for PQC cost)
# Quantum circuits are expensive per sample, so reduce n_samples
# but train longer to compensate
n_steps: 1000
learning_rate: 0.005
n_samples: 512
n_chains: 1
n_discard_per_chain: 16
d_max: 2  # Larger exchange distance helps frustrated systems

sr:
  diag_shift: 0.01

log_every: 10
checkpoint_every: 100
early_stop_variance: 1.0e-6
early_stop_patience: 100
early_stop_min_steps: 200
