    hamiltonian: square_4x4
    g: 0.3
    training: quantum
  - solution: qmsan_pure
    hamiltonian: square_4x4
    g: 0.5
    training: quantum
  - solution: qmsan_pure
    hamiltonian: square_4x4
    g: 0.7
    training: quantum

  # --- QMSAN mixed-state (Level 3b) ---
