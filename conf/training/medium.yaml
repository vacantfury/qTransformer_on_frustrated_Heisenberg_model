# Medium training config (validation before production)
# ~200 steps, 512 samples — enough to see convergence trends
n_steps: 200
learning_rate: 0.01
n_samples: 512
n_chains: 1
n_discard_per_chain: 16
d_max: 1

sr:
  diag_shift: 0.01

log_every: 10
checkpoint_every: 50
early_stop_variance: 1.0e-6
early_stop_patience: 20
early_stop_min_steps: 50
